# Config del contenedor webapp (modo producción local, profile "app" del compose de Keru-API).
# Mismo contrato que proxy.conf.json en dev: /api -> API, /media -> bucket keru-media en floci.
# Los hostnames "api" y "floci" son los servicios del docker-compose de Keru-API.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA: las rutas del router de Angular caen en index.html
    location / {
        try_files $uri /index.html;
    }

    location /api {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /media/ {
        proxy_pass http://floci:4566/keru-media/;
    }
}
