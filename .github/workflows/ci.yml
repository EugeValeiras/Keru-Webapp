name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Secret scanning (KER-25): guardrail tras el incidente VAPID (GitGuardian 2026-07-22).
  # Bloqueante: un secreto en el diff del PR (o en el working tree de main) tumba el CI.
  # Se escanea solo el diff/working tree, no el historial. Config en .gitleaks.toml.
  secret-scanning:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # El scan del PR necesita los commits de base y head para armar el rango
          fetch-depth: 0

      - name: Instalar gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Secretos en el diff del PR (bloqueante)
        if: github.event_name == 'pull_request'
        run: >
          gitleaks git . --no-banner --redact=50 --verbose
          --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Secretos en el working tree (bloqueante)
        if: github.event_name != 'pull_request'
        run: gitleaks dir . --no-banner --redact=50 --verbose

  build:
    name: build Angular
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción
        run: npm run build

  e2e:
    name: Playwright contra API dockerizada
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Feature cross-repo (KER-52): si la rama de la tarea existe en Keru-API (mismo nombre),
      # se corre Playwright contra ESA API (que trae los endpoints nuevos que la UI necesita),
      # no contra main. Fallback a main para PRs de webapp sin cambios de API.
      - name: Resolver rama de Keru-API
        id: apiref
        run: |
          BR="${{ github.head_ref }}"
          if [ -n "$BR" ] && git ls-remote --exit-code --heads https://github.com/EugeValeiras/Keru-API "$BR" >/dev/null 2>&1; then
            echo "Usando rama $BR de Keru-API"
            echo "ref=$BR" >> "$GITHUB_OUTPUT"
          else
            echo "Usando main de Keru-API"
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Keru-API
        uses: actions/checkout@v4
        with:
          repository: EugeValeiras/Keru-API
          ref: ${{ steps.apiref.outputs.ref }}
          path: keru-api

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            keru-api/package-lock.json

      # El compose de la API no trae claves VAPID por default (rotación post-GitGuardian):
      # sin claves, /push/config deshabilita el push y los tests UC-18 nunca ven el banner.
      # Se genera un par descartable que solo vive en este job.
      - name: Generar claves VAPID efímeras
        run: |
          npx --yes web-push generate-vapid-keys --json \
            | node -e "const k=JSON.parse(require('fs').readFileSync(0,'utf8')); console.log('VAPID_PUBLIC_KEY='+k.publicKey); console.log('VAPID_PRIVATE_KEY='+k.privateKey)" \
            >> "$GITHUB_ENV"

      # Como el modo producción del README de la API, pero solo el servicio api
      # (arrastra postgres + redis + floci por depends_on). El servicio webapp del
      # profile no se buildea acá: su contexto (../Keru-Webapp) no existe en el
      # runner, y esta suite corre contra ng serve.
      - name: Levantar API dockerizada
        working-directory: keru-api
        run: docker compose --profile app up -d --build api
        env:
          # Las suites E2E agotan la cuota de auth (KER-14): bypass solo en CI.
          THROTTLE_SKIP: "true"

      - name: Esperar la API
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:3000/api/v1/catalogs >/dev/null && exit 0
            sleep 2
          done
          echo 'La API no respondió en http://localhost:3000/api/v1/catalogs' >&2
          exit 1

      # El seed corre con ts-node desde el repo de la API contra la infra
      # ya publicada en localhost (5432/6379/4566), como indica su README.
      - name: Seed de datos de demo
        working-directory: keru-api
        run: |
          npm ci
          cp .env.example .env
          npm run seed

      - name: Instalar dependencias de la webapp
        run: npm ci

      - name: Instalar Chromium de Playwright
        run: npx playwright install --with-deps chromium

      # La suite espera el entorno ya levantado (no hay webServer en
      # playwright.config.ts): ng serve con proxy /api -> localhost:3000.
      - name: ng serve + suite Playwright
        run: |
          npm start &
          ok=0
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:4200 >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          if [ "$ok" != 1 ]; then
            echo 'ng serve no atendió en http://127.0.0.1:4200' >&2
            exit 1
          fi
          npm run e2e

      - name: Logs de la API (solo si falló)
        if: failure()
        working-directory: keru-api
        run: docker compose --profile app logs --tail=200
