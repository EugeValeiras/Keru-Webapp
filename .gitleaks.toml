# Secret scanning (KER-25) — guardrail tras el incidente VAPID (GitGuardian 2026-07-22).
# El CI escanea el diff del PR y el working tree de main, NUNCA el historial completo:
# los commits previos a la rotación (PR #15) contienen el par VAPID viejo, ya inerte.

[extend]
useDefault = true

# Allowlist SOLO por contenido del secreto detectado (regexTarget = "secret"): valores
# obviamente dummy de los .env.example / docs. Ojo: NO usar `paths` acá — gitleaks
# saltea el archivo entero en el traversal aunque se pida condition = "AND", y eso
# blanquearía un secreto real pegado en .env.example (el incidente original).
# Los placeholders vacíos (VAPID_PRIVATE_KEY=) no necesitan allowlist: sin valor no
# hay match posible.
[[allowlists]]
description = "Valores placeholder (change-me, dummy, <completar>) — nunca secretos reales"
regexTarget = "secret"
regexes = ['''(?i)(change-?me|changeit|placeholder|dummy|your[-_].+[-_]here|<[^>]+>)''']

# Tokens de invitación fabricados para los stubs de los e2e (page.route). No viajan al
# backend ni son criptográficos: son literales deterministas con prefijo `tok-e2e-`.
# Allowlist por contenido (regexTarget = "secret"), commit-independiente: cubre el rango
# completo del PR aunque un commit previo no tenga el // gitleaks:allow inline.
[[allowlists]]
description = "Tokens de invitación de test e2e (tok-e2e-*) — placeholders de stub, no secretos"
regexTarget = "secret"
regexes = ['''tok-e2e-[a-z0-9-]+''']
